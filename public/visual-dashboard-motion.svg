<svg width="720" height="480" viewBox="0 0 720 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bar-a { animation: riseA 3.6s ease-in-out infinite; transform-origin: bottom; }
    .bar-b { animation: riseB 4.1s ease-in-out infinite; transform-origin: bottom; }
    .bar-c { animation: riseC 3.8s ease-in-out infinite; transform-origin: bottom; }
    .cursor { animation: cursorMove 5.5s ease-in-out infinite; transform-origin: center; }
    @keyframes riseA {
      0%, 100% { transform: scaleY(0.68); }
      50% { transform: scaleY(1); }
    }
    @keyframes riseB {
      0%, 100% { transform: scaleY(0.78); }
      50% { transform: scaleY(1.08); }
    }
    @keyframes riseC {
      0%, 100% { transform: scaleY(0.56); }
      50% { transform: scaleY(0.96); }
    }
    @keyframes cursorMove {
      0%, 100% { transform: translate(0px, 0px); }
      50% { transform: translate(18px, -12px); }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="720" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081321"/>
      <stop offset="1" stop-color="#143251"/>
    </linearGradient>
  </defs>
  <rect width="720" height="480" rx="36" fill="url(#bg)"/>
  <rect x="44" y="44" width="632" height="392" rx="28" fill="#0D1D32" stroke="white" stroke-opacity="0.08"/>
  <rect x="78" y="86" width="264" height="152" rx="24" fill="#F6F2EA"/>
  <rect x="106" y="116" width="96" height="12" rx="6" fill="#D5B17F"/>
