<svg width="720" height="480" viewBox="0 0 720 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .spin { animation: spin 8s linear infinite; transform-origin: 198px 240px; }
    .tick { animation: tickIn 4.2s ease-in-out infinite; }
    .slide { animation: slideUp 5.6s ease-in-out infinite; }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes tickIn {
      0%, 100% { opacity: 0.45; }
      50% { opacity: 1; }
    }
    @keyframes slideUp {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="720" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1626"/>
      <stop offset="1" stop-color="#193652"/>
    </linearGradient>
  </defs>
  <rect width="720" height="480" rx="36" fill="url(#bg)"/>
  <rect x="44" y="44" width="632" height="392" rx="28" stroke="white" stroke-opacity="0.08"/>
  <g class="spin">
    <circle cx="198" cy="240" r="92" stroke="#F5F0E7" stroke-opacity="0.14" stroke-width="22"/>
    <path d="M198 148C232.241 148 261.947 167.419 276.769 195.841" stroke="#E6BB79" stroke-width="22" stroke-linecap="round"/>
    <path d="M281 242C281 287.84 243.84 325 198 325" stroke="#8AB3D3" stroke-width="22" stroke-linecap="round"/>
  </g>
  <g class="tick">
    <circle cx="198" cy="240" r="42" fill="#F5F0E7"/>
    <path d="M180 240L193 254L219 226" stroke="#102744" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g class="slide">
    <rect x="360" y="110" width="248" height="76" rx="24" fill="#F6F2EA"/>
    <rect x="390" y="134" width="92" height="12" rx="6" fill="#D7B98D"/>
    <rect x="390" y="156" width="170" height="12" rx="6" fill="#102744"/>
  </g>
  <g class="slide">
    <rect x="330" y="212" width="280" height="86" rx="26" fill="#133455"/>
    <rect x="360" y="240" width="92" height="12" rx="6" fill="#F6F2EA"/>
    <rect x="360" y="262" width="202" height="12" rx="6" fill="#89A8C7"/>
  </g>
  <g class="slide">
    <rect x="382" y="326" width="190" height="40" rx="20" fill="#0F1E33" stroke="white" stroke-opacity="0.08"/>
    <circle cx="418" cy="346" r="8" fill="#E6BB79"/>
    <rect x="438" y="340" width="104" height="12" rx="6" fill="#F6F2EA"/>
  </g>
</svg>
