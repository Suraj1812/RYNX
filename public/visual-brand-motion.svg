<svg width="720" height="480" viewBox="0 0 720 480" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .card-a { animation: driftA 7s ease-in-out infinite; transform-origin: center; }
    .card-b { animation: driftB 5.5s ease-in-out infinite; transform-origin: center; }
    .card-c { animation: driftC 6.2s ease-in-out infinite; transform-origin: center; }
    @keyframes driftA {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-14px); }
    }
    @keyframes driftB {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(16px) translateX(10px); }
    }
    @keyframes driftC {
      0%, 100% { transform: translateY(0px) translateX(0px); }
      50% { transform: translateY(-12px) translateX(-8px); }
    }
  </style>
  <defs>
    <linearGradient id="bg" x1="56" y1="42" x2="648" y2="446" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A1423"/>
      <stop offset="1" stop-color="#1B3553"/>
    </linearGradient>
  </defs>
  <rect width="720" height="480" rx="36" fill="url(#bg)"/>
  <rect x="44" y="44" width="632" height="392" rx="28" stroke="white" stroke-opacity="0.08"/>
  <g class="card-a">
    <rect x="82" y="104" width="244" height="144" rx="28" fill="#F5F0E7"/>
    <rect x="110" y="134" width="88" height="10" rx="5" fill="#D6B384"/>
    <rect x="110" y="160" width="162" height="18" rx="9" fill="#0D2440"/>
    <rect x="110" y="192" width="126" height="12" rx="6" fill="#8CA4BE"/>
  </g>
  <g class="card-b">
    <rect x="246" y="212" width="214" height="150" rx="30" fill="#153858"/>
    <rect x="276" y="248" width="118" height="12" rx="6" fill="#F7F4EE"/>
    <rect x="276" y="276" width="154" height="18" rx="9" fill="#C99C5A"/>
    <rect x="276" y="314" width="94" height="12" rx="6" fill="#9BB5CF"/>
  </g>
  <g class="card-c">
    <rect x="430" y="86" width="204" height="154" rx="30" fill="#0E1D32" stroke="white" stroke-opacity="0.07"/>
    <rect x="456" y="116" width="134" height="10" rx="5" fill="#E9D4B2"/>
    <rect x="456" y="142" width="110" height="68" rx="20" fill="#214E7B"/>
  </g>
</svg>
